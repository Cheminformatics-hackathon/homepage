<section class="hero-wrap">
  <div class="container">
    <div class="hero-panel">
      <div class="hero-bubbles" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="hero-copy">
        <p class="hero-copy-en">{{ site.data.site.event.name_en }}</p>
        <h1>{{ site.data.site.event.name }}</h1>
        <p class="hero-tagline">{{ site.data.site.event.catchcopy }}</p>
        <ul class="hero-meta">
          <li><i class="bi bi-calendar3"></i> {{ site.data.site.date.display }}</li>
          <li><i class="bi bi-geo-alt"></i> {{ site.data.site.venue.name }}</li>
          <li><i class="bi bi-people"></i> {{ site.data.site.target }}</li>
        </ul>
      </div>
    </div>
  </div>
</section>
