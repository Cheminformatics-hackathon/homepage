<section class="home-section">
  <div class="container">
    <div class="panel panel-themes">
      <h2><i class="bi bi-lightbulb-fill"></i> テーマ・トラック</h2>
      <div class="theme-grid">
        {% for theme in site.data.themes limit:4 %}
        <article>
          <h3>{{ theme.title }}</h3>
          <p>{{ theme.description | truncate: 110 }}</p>
        </article>
        {% endfor %}
      </div>
      <p class="panel-action">
        <a href="{{ '/themes' | relative_url }}">すべてのテーマを見る <i class="bi bi-arrow-right"></i></a>
      </p>
    </div>
  </div>
</section>
