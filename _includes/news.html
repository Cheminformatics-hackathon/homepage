<section class="py-5 bg-light" id="news">
    <div class="container">
        <h2 class="section-title text-center mb-4"><i class="bi bi-megaphone me-2"></i>お知らせ</h2>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="list-group">
                    {% for item in site.data.news limit:5 %}
                    <div
                        class="list-group-item list-group-item-action d-flex justify-content-between align-items-start py-3">
                        <div>
                            <span class="text-muted small me-3">{{ item.date }}</span>
                            {% if item.badge != "" %}
                            <span class="badge bg-accent me-2">{{ item.badge }}</span>
                            {% endif %}
                            <span class="fw-medium">{{ item.title }}</span>
                            {% if item.content != "" %}
                            <p class="mb-0 mt-1 text-muted small">{{ item.content }}</p>
                            {% endif %}
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</section>
