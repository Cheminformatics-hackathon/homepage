<header class="site-header sticky-top">
  <nav class="main-nav">
    <div class="container">
      <a class="navbar-brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark"><i class="bi bi-hexagon-fill"></i></span>
        <span class="brand-text">
          <strong>{{ site.data.site.event.name }}</strong>
          <small>{{ site.data.site.event.name_en }}</small>
        </span>
      </a>
      <ul class="main-nav-list">
        {% for item in site.data.navigation %}
        {% assign is_home = item.match == '/' and page.url == '/' %}
        {% assign is_sub = item.match != '/' and page.url contains item.match %}
        <li>
          <a class="{% if is_home or is_sub %}active{% endif %}" href="{{ item.url | relative_url }}">{{ item.label }}</a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </nav>
</header>
