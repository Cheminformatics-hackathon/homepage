<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <h2><i class="bi bi-hexagon-fill"></i> {{ site.data.site.event.name }}</h2>
      <p>{{ site.data.site.event.name_en }}</p>
      <p class="small">{{ site.data.site.event.description }}</p>
    </div>
    <div class="footer-meta">
      <p>主催: {{ site.data.site.organizer.name }}</p>
      <p>お問い合わせ: {{ site.data.site.links.email }}</p>
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.data.site.organizer.name }}</p>
    </div>
  </div>
</footer>
