---
layout: default
---

<div class="page-header-section py-4 bg-navy text-white">
    <div class="container">
        <h1 class="page-title mb-1">{{ page.title }}</h1>
        {% if page.subtitle %}
        <p class="page-subtitle mb-0 text-light opacity-75">{{ page.subtitle }}</p>
        {% endif %}
    </div>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            {{ content }}
        </div>
    </div>
</div>
