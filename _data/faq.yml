# ======================================================
# FAQ（よくある質問）
# カテゴリごとに分類
# ======================================================

categories:
  - name: "参加について"
    id: "participation"
    items:
      - question: "参加資格はありますか？"
        answer: "学部生から博士課程の学生、社会人まで幅広くご参加いただけます。ケモインフォマティクスの初心者も歓迎です。"
      - question: "チームは事前に組む必要がありますか？"
        answer: "いいえ。イベント初日にテーマ紹介とチーム編成を行います。もちろん、事前にチームを組んでの参加も可能です。"
      - question: "定員はありますか？"
        answer: "TBA（決まり次第お知らせします）"
      - question: "参加費はいくらですか？"
        answer: "TBA（宿泊費・食事代を含む予定です）"

  - name: "事前準備について"
    id: "preparation"
    items:
      - question: "どのようなスキルが必要ですか？"
        answer: "Pythonの基本的な利用経験があると望ましいですが、必須ではありません。チーム内で役割分担ができるため、データ分析・文献調査・プレゼンなど多様なスキルが活かせます。"
      - question: "事前に準備すべきことはありますか？"
        answer: "Python環境（Anaconda推奨）のインストール、GitHubアカウントの作成をお願いします。詳しくは参加登録後にご案内します。"
      - question: "持ち込むPCのスペックに指定はありますか？"
        answer: "一般的なノートPCであれば問題ありません。GPUが必要な計算はクラウド環境を用意する予定です。"

  - name: "当日について"
    id: "onsite"
    items:
      - question: "何を持っていけばよいですか？"
        answer: "ノートPC、充電器、着替え、洗面用具をお持ちください。電源タップやポケットWi-Fiがあると便利です。"
      - question: "食事は提供されますか？"
        answer: "宿泊施設での食事が含まれる予定です。アレルギー等は事前にお知らせください。"
      - question: "深夜まで作業できますか？"
        answer: "作業スペースは24時間利用可能の予定ですが、他の参加者への配慮をお願いします。詳細は会場のルールに従ってください。"

  - name: "成果物について"
    id: "output"
    items:
      - question: "成果物の形式は決まっていますか？"
        answer: "最終日に各チームによるプレゼンテーションを予定しています。コードはGitHubリポジトリで共有し、ポスターやデモの作成も歓迎します。"
      - question: "成果物の著作権はどうなりますか？"
        answer: "参加者が作成したコードや資料の著作権は参加者に帰属します。オープンソースライセンスでの公開を推奨しています。"

  - name: "支払い・キャンセルについて"
    id: "payment"
    items:
      - question: "支払い方法は？"
        answer: "TBA（決まり次第お知らせします）"
      - question: "キャンセルはできますか？"
        answer: "キャンセルポリシーは参加登録ページをご確認ください。一定の期限を過ぎるとキャンセル料が発生する場合があります。"
